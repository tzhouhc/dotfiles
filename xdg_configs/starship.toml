# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """$sudo$directory$character"""
right_format = """$all"""

# Inserts a blank line between shell prompts
add_newline = false

[directory]
read_only = 'ΎΑμ'
home_symbol = '~'
truncation_symbol = 'έΑο/'
style = 'bold blue'

[line_break]
disabled = true

[aws]
disabled = true

[status]
symbol = 'ΎΑΞ'
not_executable_symbol = 'ΎΒη'
not_found_symbol = '≤░ΞΚ'
sigint_symbol = '≤░σΙ'
signal_symbol = '≤▒ΡΜ'

[time]
disabled = false

# Replace the 'έζψ' symbol in the prompt with 'έηε'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[έηε](bold green)' # The 'success_symbol' segment is being set to 'έηε' with the color 'bold green'
error_symbol   = '[έηε](bold red)'

[sudo]
symbol = '≤░ΝΗ '

[git_branch]
symbol = 'ΎΡα '

[git_commit]
tag_symbol = ' ≤░Υ╣ '

[git_status]
conflicted = '≤░ζι'
ahead = 'ΎΒλ'
behind = 'ΎΒμ'
diverged = 'ΎΣΔ'
untracked = '?'
modified = '!'
deleted = '≤░Η┤'
style = 'bold blue'
