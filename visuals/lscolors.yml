colors:
  # Based on the dark mode of `Solarized`
  # (https://ethanschoonover.com/solarized/)
  #
  # The assignment of colors to file types roughly follows `dircolors`

  # dark group
  dark0  :  '4c566a'
  # light group
  light0   :  'd8dee9'
  light1   :  'e5e9f0'
  light2   :  '9fa3ab'

  # color group
  yellow  :  'ebcb8b'
  orange  :  'd08770'
  red     :  'bf616a'
  magenta :  'eb8aeb'
  violet  :  'b48ead'
  blue    :  '88c0d0'
  cyan    :  '8fbcbb'
  green   :  'a3be8c'

core:
  regular_file:
    foreground: light0

  directory:
    foreground: blue
    font-style: bold

  executable_file:
    foreground: green
    font-style: bold

  symlink:
    foreground: cyan
    font-style: bold

  broken_symlink:
    foreground: red
    background: dark0
    font-style: bold

  fifo:
    foreground: yellow
    background: dark0
    font-style: bold

  socket:
    foreground: magenta
    background: dark0
    font-style: bold

  character_device:
    foreground: yellow
    background: dark0
    font-style: bold

  block_device:
    foreground: yellow
    background: dark0
    font-style: bold

  normal_text:
    foreground: light0

text:
  special:
    foreground: light0
    font-style: italic

  todo:
    foreground: light0
    font-style: bold

  licenses:
    foreground: dark0

  configuration:
    foreground: yellow

  other:
    foreground: light0

markup:
  foreground: cyan

programming:
  foreground: orange

media:
  image:
    foreground: magenta

  audio:
    foreground: cyan

  video:
    foreground: magenta
    font-style: bold

  fonts:
    foreground: violet

office:
  foreground: orange

archives:
  foreground: red
  font-style: bold

executable:
  foreground: light0

unimportant:
  foreground: dark0
